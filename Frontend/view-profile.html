<!DOCTYPE html>
<html>
<head>
    <title>View Profile</title>
    <link rel="stylesheet" href="view-profile.css">
</head>
<body>
    <header class="navbar">
    <div class="logo">Smart Job Portal</div>

    <div class="welcome-center">
        <span id="welcomeText"></span>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="profile-card">
    <h2>Student Profile Details</h2>

    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Phone:</strong> <span id="phone"></span></p>
    <p><strong>Education:</strong> <span id="education"></span></p>
    <p><strong>Skills:</strong> <span id="skills"></span></p>
    <p><strong>Location:</strong> <span id="location"></span></p>
    <p><strong>About:</strong> <span id="about"></span></p>

    <button onclick="goBack()">Back</button>
</div>

<script src="view-profile.js"></script>

</body>
</html>
