<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Job Portal</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body class="auth-body">
	<div id="popupMessage" class="popup"></div>

<div class="auth-container">
    <h2>Create Your Account</h2>
    <p class="subtitle">Start your career journey with us</p>
    <form id="registerForm" >
        <div class="form-group">
            <input type="text" id="name" name="name" required>
            <label>Full Name</label>
        </div>
        <div class="form-group">
        <input type="email" id="email" name="email" required>
        <label>Email Address</label>
        <small class="error" id="emailError"></small>
       </div>
        <div class="form-group">
        <input type="password"  id="password" name="password" required>
        <label>Password</label>
        </div>
        <div class="form-group">
        <input type="password"  name="confirmPassword" id="confirmPassword" required>
        <label>Confirm Password</label>
        <small class="error" id="passwordError"></small>
        </div>
        <div class="form-group">
            <select id="role" class="custom-select" name="role" required onchange ="toggleCompanyField()">
                <option value="">Select Role</option>
                <option value="student">Student</option>
                <option value ="recruiter">Recruiter</option>
            </select>
        </div>
        <div class="form-group">
    <input type="text" id="company" name="company" disabled>
    <label>Company Name</label>
        </div>
        <button type="submit" class="register-btn">Register</button>
        <p class="login-text">
            Already have an account? <a href="loginPage.html">Login</a>
        </p>
    </form>
</div>
<script src="script.js"></script>

</body>
</html>
